<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>방명록</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; }
    h1 { margin-bottom: .25rem; }
    form { display: flex; gap: .5rem; margin: 1rem 0; }
    textarea { flex: 1; padding: .6rem; font: inherit; resize: vertical; min-height: 3rem; }
    button { padding: .6rem 1rem; font: inherit; cursor: pointer; }
    #status { min-height: 1.2rem; color: #c0392b; font-size: .9rem; }
    ul { list-style: none; padding: 0; }
    li { border: 1px solid #ccc; border-radius: 8px; padding: .75rem; margin-bottom: .5rem; display: flex; justify-content: space-between; gap: .5rem; }
    .content { white-space: pre-wrap; word-break: break-word; }
    .meta { color: #888; font-size: .8rem; margin-top: .35rem; }
    .del { background: transparent; border: none; color: #c0392b; font-size: 1.1rem; align-self: flex-start; }
  </style>
</head>
<body>
  <h1>방명록</h1>
  <p>글을 남기면 백엔드(Render)를 거쳐 DB(Supabase)에 저장됩니다.</p>

  <!-- 글쓰기 폼 -->
  <form id="form">
    <textarea id="input" maxlength="500" placeholder="메시지를 남겨보세요 (최대 500자)" required></textarea>
    <button type="submit">남기기</button>
  </form>

  <div id="status"></div>
  <ul id="list"></ul>

  <script type="module">
    // ==========================================================
    //  방명록 프론트엔드 (로그인 없는 공개 버전)
    //  - 이 페이지는 DB에 "직접" 접근하지 않습니다.
    //  - 오직 백엔드 API(Render) 만 fetch 로 호출합니다.
    //  - 그래서 여기엔 어떤 비밀 키도 없습니다. (설계상 안전)
    //  코드를 [1]~[6] 순서로 뜯어보세요.
    // ==========================================================

    // ---- [1] 연결 설정 : 이 한 줄만 본인 Render 주소로 바꾸면 됩니다 ----
    //  Render 배포 후 받는 주소. 예: https://guestbook-api-xxxx.onrender.com
    //  끝에 슬래시(/) 붙이지 마세요.
    const API_BASE_URL = "https://여기에-render-주소.onrender.com";

    // ---- [2] 화면 요소 잡기 + 상태 표시 헬퍼 ----
    const form   = document.getElementById("form");
    const input  = document.getElementById("input");
    const list   = document.getElementById("list");
    const status = document.getElementById("status");
    const setStatus = (msg) => { status.textContent = msg; };

    // ---- [3] READ : 목록 불러오기 ----
    async function load() {
      setStatus("불러오는 중…");
      try {
        const res = await fetch(`${API_BASE_URL}/messages`);
        if (!res.ok) throw new Error(`서버 오류 (${res.status})`);
        render(await res.json());
        setStatus("");
      } catch (err) {
        setStatus(`목록을 불러오지 못했습니다: ${err.message}`);
      }
    }

    // ---- [4] 그리기 : 사용자 글은 textContent 로만! (XSS 방지) ----
    //  innerHTML 을 쓰면 누가 <script> 를 남겼을 때 코드로 실행될 수 있습니다.
    //  textContent 는 무조건 "글자"로만 취급하므로 안전합니다.
    function render(messages) {
      list.innerHTML = "";
      for (const m of messages) {
        const li = document.createElement("li");

        const box = document.createElement("div");
        const p = document.createElement("div");
        p.className = "content";
        p.textContent = m.content;               // ← 핵심: 사용자 입력은 textContent
        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = new Date(m.created_at).toLocaleString("ko-KR");
        box.append(p, meta);

        // 삭제 버튼 (개선 기능) — 공개 버전이라 누구나 삭제 가능
        const del = document.createElement("button");
        del.className = "del";
        del.type = "button";
        del.textContent = "🗑";
        del.title = "삭제";
        del.addEventListener("click", () => remove(m.id));

        li.append(box, del);
        list.appendChild(li);
      }
    }

    // ---- [5] CREATE : 글 저장 ----
    form.addEventListener("submit", async (e) => {
      e.preventDefault();                        // 폼 제출 시 새로고침 막기
      const content = input.value.trim();
      if (!content) return;
      setStatus("저장 중…");
      try {
        const res = await fetch(`${API_BASE_URL}/messages`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ content }),
        });
        if (!res.ok) {
          const { error } = await res.json().catch(() => ({}));
          throw new Error(error || `서버 오류 (${res.status})`);
        }
        input.value = "";
        await load();                            // 저장 후 목록 새로고침
      } catch (err) {
        setStatus(`저장 실패: ${err.message}`);
      }
    });

    // ---- [6] DELETE : 글 삭제 ----
    async function remove(id) {
      if (!confirm("이 글을 삭제할까요?")) return;
      setStatus("삭제 중…");
      try {
        const res = await fetch(`${API_BASE_URL}/messages/${id}`, { method: "DELETE" });
        if (!res.ok) throw new Error(`서버 오류 (${res.status})`);
        await load();
      } catch (err) {
        setStatus(`삭제 실패: ${err.message}`);
      }
    }

    // 페이지가 열리면 목록을 한 번 불러옵니다.
    load();
  </script>
</body>
</html>
